<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <script>
    // Apply the saved theme before first paint to avoid a flash
    try {
      if (JSON.parse(localStorage.getItem('elatche.theme') || '"light"') === 'light') {
        document.documentElement.classList.add('light');
      }
    } catch (e) {
      document.documentElement.classList.add('light');
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elatche — Discipline. Focus. Consistent Action.</title>
  <meta name="description" content="A minimalist daily focus dashboard: set your one intention, keep your rituals, do the deep work, and watch your consistency compound." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&family=Archivo:wght@600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
